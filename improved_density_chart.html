<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Matrix Retention Chart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .slide-container {
            width: 1200px;
            height: 675px;
            background: #000000;
            display: flex;
            border: 1px solid #333;
            box-sizing: border-box;
        }

        .left-panel {
            width: 38%;
            padding: 80px 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #222;
        }

        .main-title {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .description {
            font-size: 18px;
            color: #999;
            line-height: 1.6;
            word-break: keep-all;
            letter-spacing: -0.5px;
        }

        .footer-stats {
            margin-top: auto;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 500;
            color: #ccc;
            margin-top: 10px;
        }

        .stat-highlight {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            display: block;
            margin-top: 8px;
        }

        .right-panel {
            width: 62%;
            position: relative;
            padding: 60px 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #chart-container {
            flex-grow: 1;
            width: 100%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .grid-line {
            stroke: #333333;
            stroke-width: 1;
        }

        .grid-text {
            fill: #777777;
            font-size: 12px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Left Panel -->
        <div class="left-panel">
            <div>
                <div class="main-title">홈 피드<br>월별/주별 리텐션<br>5% 하락</div>
                <div class="description">
                    홈피드는 사용자가 가장 먼저 진입하는 핵심 허브지만,<br>
                    리서치 결과 사용자가 머무르지 않고 이탈하는 패턴이 지속적으로 반복되었습니다.
                </div>
            </div>
            
            <div class="footer-stats">
                <div class="stat-value">낮은 홈피드 사용자 만족도 
                    <span class="stat-highlight">2.5 / 5 점</span>
                </div>
            </div>
        </div>

        <!-- Right Panel : Minimal Matrix -->
        <div class="right-panel">
            <div id="chart-container"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('chart-container');
        const w = container.clientWidth;
        const h = container.clientHeight;
        
        const padding = { top: 40, right: 100, bottom: 40, left: 40 };
        const drawW = w - padding.left - padding.right;
        const drawH = h - padding.top - padding.bottom;

        // X Axis: 7 grid columns (0 to 6)
        const xCols = 6; 
        const getX = (i) => padding.left + (i / xCols) * drawW;
        
        // Y Axis: 58% to 72%
        const yMin = 56;
        const yMax = 72;
        const getY = (val) => padding.top + drawH - ((val - yMin) / (yMax - yMin)) * drawH;

        let svg = `<svg viewBox="0 0 ${w} ${h}">`;

        // 1. Draw Grid Lines Exactly like the reference poster (Geometric & Stark)
        const xLabels = ['24.10', '', '24.12', '', '25.02', '', '25.04'];
        
        for(let i=0; i<=xCols; i++) {
            const x = getX(i);
            svg += `<line class="grid-line" x1="${x}" y1="${padding.top}" x2="${x}" y2="${padding.top + drawH}" />`;
            if (xLabels[i]) {
                svg += `<text class="grid-text" x="${x}" y="${padding.top + drawH + 25}" text-anchor="middle">${xLabels[i]}</text>`;
            }
        }

        // Horizontal grids (56 to 72, every 1%) -> forms the perfect matrix mesh
        for(let y=yMin; y<=yMax; y+=1) {
            const yPos = getY(y);
            svg += `<line class="grid-line" x1="${padding.left}" y1="${yPos}" x2="${padding.left + drawW}" y2="${yPos}" />`;
            if (y % 2 === 0) {
                // Label every 2%
                svg += `<text class="grid-text" x="${padding.left - 15}" y="${yPos + 4}" text-anchor="end">${y}%</text>`;
            }
        }

        // 2. Draw Data Dots
        const dataM = [
            {i: 0, val: 70}, 
            {i: 2, val: 68}, 
            {i: 4, val: 66}, 
            {i: 6, val: 65}
        ];
        const dataW = [
            {i: 0, val: 65}, 
            {i: 2, val: 64}, 
            {i: 4, val: 62}, 
            {i: 6, val: 60}
        ];

        // Monthly (Blue Dots, matching original brand color)
        dataM.forEach((d, index) => {
            const x = getX(d.i);
            const y = getY(d.val);
            
            // Connect with a very thin, subtle line so trend is readable but dots dominate
            if (index > 0) {
                const prev = dataM[index-1];
                svg += `<line x1="${getX(prev.i)}" y1="${getY(prev.val)}" x2="${x}" y2="${y}" stroke="#3399FF" stroke-width="1.5" opacity="0.4" />`;
            }
            svg += `<circle cx="${x}" cy="${y}" r="12" fill="#3399FF" />`;
            // Label
            svg += `<text x="${x}" y="${y - 20}" fill="#3399FF" font-size="14" font-weight="700" text-anchor="middle">${d.val}%</text>`;
            
            if (index === dataM.length - 1) {
                svg += `<text x="${x + 20}" y="${y + 5}" fill="#3399FF" font-size="14" font-weight="500">월별 리텐션</text>`;
            }
        });

        // Weekly (Orange Dots, matching original brand color)
        dataW.forEach((d, index) => {
            const x = getX(d.i);
            const y = getY(d.val);
            
            if (index > 0) {
                const prev = dataW[index-1];
                svg += `<line x1="${getX(prev.i)}" y1="${getY(prev.val)}" x2="${x}" y2="${y}" stroke="#FF6B35" stroke-width="1.5" opacity="0.4" />`;
            }
            svg += `<circle cx="${x}" cy="${y}" r="10" fill="#FF6B35" />`;
            // Label
            svg += `<text x="${x}" y="${y + 26}" fill="#FF6B35" font-size="14" font-weight="700" text-anchor="middle">${d.val}%</text>`;
            
            if (index === dataW.length - 1) {
                svg += `<text x="${x + 20}" y="${y + 5}" fill="#FF6B35" font-size="14" font-weight="500">주별 리텐션</text>`;
            }
        });

        svg += `</svg>`;
        container.innerHTML = svg;
    </script>
</body>
</html>
